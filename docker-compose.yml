version: '3.8'

services:
  wechat-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat-bot
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      # 持久化日志
      - ./logs:/app/logs
      # 挂载环境变量配置（可选，也可使用 env_file）
      # - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"