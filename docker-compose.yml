version: '3.8'

services:
  wechat-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat-bot
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8899}:${SERVER_PORT:-8899}"
    volumes:
      # 持久化日志
      - ./logs:/app/logs
      # 挂载环境变量配置（支持热更新，修改后 restart 即可生效）
      - ./.env:/app/.env:ro
      # 挂载代码同步模块（支持热更新脚本和配置）
      - ./code_sync:/app/code_sync
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT:-8899}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
          gateway: 192.168.100.1
